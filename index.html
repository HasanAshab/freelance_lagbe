<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelance Lagbe · Bangladesh</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',Roboto}
body{background:#f4f7fb;color:#1e2b37}

/* navbar */
.navbar{background:#0b2a3c;color:#fff;padding:1rem 5%;display:flex;justify-content:space-between}
.logo{font-size:1.6rem;font-weight:700}
.logo span{color:#f9c74f}
.nav-links{display:flex;gap:2rem}
.nav-links a{color:#fff;text-decoration:none}

/* layout */
.container{max-width:1200px;margin:auto;padding:0 5%}

.hero{background:linear-gradient(145deg,#dceefb,#fff);padding:3rem;border-radius:0 0 30px 30px;margin-bottom:2rem}
.hero h1{text-align:center;font-size:2rem}

.section-header{margin:2rem 0}
.section-header h2{border-left:8px solid #f9c74f;padding-left:1rem}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2rem}

.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 10px 20px rgba(0,0,0,.05);display:flex;flex-direction:column}
.card-img{width:100%;height:170px;object-fit:cover}
.card-content{padding:1rem;display:flex;flex-direction:column}
.card-title{font-weight:600}
.card-desc{font-size:.9rem;margin:5px 0;color:#666}
.price{font-weight:700;color:#1a7f4c;margin:10px 0}

.btn{border:none;padding:.6rem 1rem;border-radius:30px;background:#0b2a3c;color:white;cursor:pointer}
.btn-order{background:#f9c74f;color:#0b2a3c}

/* modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);align-items:center;justify-content:center}
.modal-card{background:white;padding:2rem;border-radius:20px;width:350px;text-align:center}

.amount-box{
background:#e8f5e9;
padding:10px;
border-radius:10px;
font-weight:700;
margin:10px 0;
color:#1a7f4c;
}

.bkash-number{font-size:1.4rem;font-weight:700;margin:10px 0}
.txn-input{width:100%;padding:.7rem;border-radius:20px;border:2px solid #ccc;margin:10px 0;text-align:center}

.verifying{display:none;color:#f08c2e;font-weight:600;margin:10px}

/* toast */
.toast{
position:fixed;
top:30px;
right:30px;
background:#1a7f4c;
color:white;
padding:14px 22px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
opacity:0;
transform:translateY(-20px);
transition:.4s;
z-index:9999;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

/* video */
.video-section{display:none;background:#0b1c26;padding:2rem;border-radius:20px;margin-top:30px}
.video-section.show{display:block}
.video-section video{width:100%;border-radius:10px}

/* chat */
.chat-container{display:none;background:white;margin-top:30px;border-radius:20px;padding:1rem;border:1px solid #ddd}
.chat-container.show{display:flex;flex-direction:column}

.chat-messages{min-height:200px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px}

.message{padding:8px 12px;border-radius:15px;font-size:.9rem;max-width:70%}
.received{background:#e9f0f5}
.sent{background:#0b2a3c;color:white;margin-left:auto}

.chat-input-area{display:flex;gap:5px}
.chat-input-area input{flex:1;padding:.6rem;border-radius:20px;border:1px solid #ccc}
.chat-input-area button{background:#f9c74f;border:none;border-radius:20px;padding:0 15px;font-weight:700}

footer{text-align:center;padding:2rem;color:#666}
</style>
</head>

<body>

<nav class="navbar">
<div class="logo">Freelance<span>Lagbe</span></div>
<div class="nav-links">
<a href="#">Home</a>
<a href="#">Courses</a>
<a href="#">Services</a>
</div>
</nav>

<section class="hero">
<h1>বাংলাদেশে ফ্রিল্যান্সিং শিখুন</h1>
</section>

<main class="container">

<div class="section-header"><h2>📘 Courses</h2></div>
<div id="coursesGrid" class="card-grid"></div>

<div class="section-header"><h2>⚡ Services</h2></div>
<div id="servicesGrid" class="card-grid"></div>

<!-- video -->
<div id="videoPlayerContainer" class="video-section">
<h3 id="playingCourseTitle" style="color:white"></h3>
<video id="courseVideoPlayer" controls></video>
</div>

<!-- chat -->
<div id="chatInterface" class="chat-container">
<div style="font-weight:700;margin-bottom:10px">Chat with Freelancer</div>

<div id="chatMessages" class="chat-messages"></div>

<div class="chat-input-area">
<input id="chatInput">
<button id="sendChatBtn">Send</button>
</div>
</div>

</main>

<footer>© FreelanceLagbe Bangladesh</footer>

<!-- toast -->
<div id="toast" class="toast">Payment successful</div>

<!-- payment modal -->
<div id="paymentModal" class="modal">
<div class="modal-card">

<h3>bKash Payment</h3>

<div id="amountBox" class="amount-box"></div>

<div class="bkash-number">01784284541</div>

<input id="txnIdInput" class="txn-input" placeholder="Transaction ID">

<div id="verifyingMsg" class="verifying">Verifying payment...</div>

<button id="submitPayment" class="btn">Submit</button>
<button id="closeModalBtn" class="btn">Cancel</button>

</div>
</div>

<script>

 const courses = [
        { id: 4, title: "ক্যানভা গ্রাফিক্স ডিজাইন", price: 21999, thumbnail: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQnkkJlMMC-sPIggAPQ9NucfX2jXFgIRoMzmA&s", introVideo: "https://www.w3schools.com/html/mov_bbb.mp4", description: "সোশ্যাল মিডিয়া পোস্ট, লোগো, ব্যানার ডিজাইন।" },
        { id: 1, title: "ফ্রিল্যান্সিং ফিভারে (Fiverr)", price: 11999, thumbnail: "https://www.mentor.com.bd/wp-content/uploads/2024/01/Freelancing-Journey-WordPress-1024x576.jpg", introVideo: "https://www.w3schools.com/html/mov_bbb.mp4", description: "ফাইবার এক্সপার্ট হওয়ার সহজ কৌশল, অর্ডার পাওয়া থেকে ডেলিভারি।" },
        { id: 3, title: "ডিজিটাল মার্কেটিং ব্যাচ ৩", price: 10000, thumbnail: "https://khulnacoders.com/wp-content/uploads/2025/09/Flyerwiz_1758535818230.jpg", introVideo: "https://www.w3schools.com/html/mov_bbb.mp4", description: "গুগল, ফেসবুক মার্কেটিং – বিজনেস গ্রো করুন।" },
        { id: 2, title: "ওয়েব ডেভেলপমেন্ট (ব্যাচ ৫)", price: 8000, thumbnail: "https://i.ytimg.com/vi/pJQXGmMofro/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLBhzI9JOMdv9VQp2kj7HMM0twockw", introVideo: "https://www.w3schools.com/html/mov_bbb.mp4", description: "HTML, CSS, JS দিয়ে মর্ডান ওয়েবসাইট বানান।" },
      ];

      const services = [
        { id: 101, title: "WordPress ওয়েবসাইট তৈরি", price: 49000, thumbnail: "https://fiverr-res.cloudinary.com/images/t_main1,q_auto,f_auto,q_auto,f_auto/gigs/447914404/original/220ed0e94d8961356f75609217274db000ed545a/design-redesign-and-develop-your-custom-wordpress-website.png", description: "পূর্ণ ওয়েবসাইট সেটআপ, পেইজ, প্লাগইন সহ।" },
        { id: 102, title: "ইলাস্ট্রেটরে লোগো ডিজাইন", price: 41000, thumbnail: "https://fiverr-res.cloudinary.com/images/t_main1,q_auto,f_auto,q_auto,f_auto/gigs/199325307/original/82b167eaf419f11be0bfaae8936f7cba68416cb2/do-business-logo-design-redesign-and-branding.png", description: "মিনিমালিস্ট / বাংলা টাইপোগ্রাফি লোগো।" },
        { id: 103, title: "META ADS মার্কেটিং", price: 31000, thumbnail: "https://fiverr-res.cloudinary.com/images/t_main1,q_auto,f_auto,q_auto,f_auto/gigs/355733964/original/6dc098396585ce00e210b13ef4b41e9affc3076f/do-facebook-instagram-ads-camapign-marketing-advertising-and-fb-ads-management.jpg", description: "ফেসবুক/ইন্সটাগ্রাম ক্যাম্পেইন চালানো।" },
        { id: 104, title: "ভিডিও এডিটিং (প্রিমিয়ার প্রো)", price: 24999, thumbnail: "https://fiverr-res.cloudinary.com/videos/so_46.248611,t_main1,q_auto,f_auto/v1/video-attachments/gig/videos/cf76bc0022f24356ddd1f006982b45e3-1769895075754/Our%20Agency%20edit%20your%20videos%20with%20smooth%20cuts_%20subtitles_%20motion%20graphics_%20and%20sound%20design/edit-your-videos-with-smooth-cuts-subtitles-motion-graphics-and-sound-design.png", description: "ইউটিউব, রিলস, প্রমোশনাল ভিডিও।" }
      ];
    
  function makePriceLocale(objs) {
    objs.forEach(obj => {
      obj.price = obj.price.toLocaleString();
    });
  }

  makePriceLocale(courses);
  makePriceLocale(services);


const coursesGrid=document.getElementById("coursesGrid")
const servicesGrid=document.getElementById("servicesGrid")

courses.forEach(c=>{
coursesGrid.innerHTML+=`
<div class="card">
<img class="card-img" src="${c.thumbnail}">
<div class="card-content">
<div class="card-title">${c.title}</div>
<div class="card-desc">${c.description}</div>
<div class="price">৳ ${c.price}</div>
<button class="btn buy-course" data-id="${c.id}">Buy Now</button>
</div>
</div>`
})

services.forEach(s=>{
servicesGrid.innerHTML+=`
<div class="card">
<img class="card-img" src="${s.thumbnail}">
<div class="card-content">
<div class="card-title">${s.title}</div>
<div class="card-desc">${s.description}</div>
<div class="price">৳ ${s.price}</div>
<button class="btn btn-order service-order" data-id="${s.id}">Order</button>
</div>
</div>`
})

const modal=document.getElementById("paymentModal")
const txnInput=document.getElementById("txnIdInput")
const verifyingMsg=document.getElementById("verifyingMsg")
const amountBox=document.getElementById("amountBox")

let currentType=null
let currentId=null
let currentPrice=0

document.addEventListener("click",e=>{

if(e.target.classList.contains("buy-course")){
const id=parseInt(e.target.dataset.id)
const course=courses.find(c=>c.id===id)

currentType="course"
currentId=id
currentPrice=course.price

amountBox.innerText="Amount: ৳ "+course.price

modal.style.display="flex"
}

if(e.target.classList.contains("service-order")){
const id=parseInt(e.target.dataset.id)
const service=services.find(s=>s.id===id)

currentType="service"
currentId=id
currentPrice=service.price

amountBox.innerText="Amount: ৳ "+service.price

modal.style.display="flex"
}

})

document.getElementById("closeModalBtn").onclick=()=>modal.style.display="none"

function showToast(msg){
const toast=document.getElementById("toast")
toast.innerText=msg
toast.classList.add("show")

setTimeout(()=>toast.classList.remove("show"),3000)
}

function validTx(t){return /^[A-Z0-9]{10}$/i.test(t)}

document.getElementById("submitPayment").onclick=()=>{

const tx=txnInput.value.trim()

if(!validTx(tx)){alert("Invalid TxID");return}

verifyingMsg.style.display="block"

setTimeout(()=>{

modal.style.display="none"
verifyingMsg.style.display="none"

showToast("✅ Payment Successful")

if(currentType==="course"){

const course=courses.find(c=>c.id===currentId)

const videoContainer=document.getElementById("videoPlayerContainer")
const videoPlayer=document.getElementById("courseVideoPlayer")

videoPlayer.src=course.introVideo
videoPlayer.load()

document.getElementById("playingCourseTitle").innerText="▶ "+course.title

videoContainer.classList.add("show")
videoPlayer.play()

videoContainer.scrollIntoView({behavior:"smooth"})
}

if(currentType==="service"){

const chat=document.getElementById("chatInterface")
const msgs=document.getElementById("chatMessages")

msgs.innerHTML=""

const first=document.createElement("div")
first.className="message received"
first.innerText="Hey Hasan, explain me the task in details here..."
msgs.appendChild(first)

chat.classList.add("show")
chat.scrollIntoView({behavior:"smooth"})
}

},5000)

}

const chatMessages=document.getElementById("chatMessages")
const chatInput=document.getElementById("chatInput")

document.getElementById("sendChatBtn").onclick=()=>{

const txt=chatInput.value.trim()
if(!txt)return

const m=document.createElement("div")
m.className="message sent"
m.innerText=txt

chatMessages.appendChild(m)

chatInput.value=""
}

</script>

</body>
</html>
